name: Generate Snake Animation

on:
  schedule:
    # Runs every 6 hours to update the snake
    - cron: "0 */6 * * *"
  
  # Allows manual triggering for testing
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Snake SVG with Custom Palette
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          # Custom Palette: Red Base + Your Secondary Colors for Intensity
          custom_palette: |
            #ff0000
            #2596be
            #c77d59
            #28874a
            #8b0000
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake-light.svg?palette=github-light

      - name: Deploy to Output Branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          publish_branch: output
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          force_orphan: true
